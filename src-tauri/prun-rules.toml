ecosystem = "junk"
enabled   = false
paths     = ["~/.cache/pre-commit"]

[[global_cache]]
id        = "playwright-browsers"
name      = "Playwright browser binaries"
ecosystem = "testing"
enabled   = false
paths     = ["~/.cache/ms-playwright"]
note      = "Re-downloaded by `playwright install`; often hundreds of MB per browser."

[[global_cache]]
id        = "cypress-binary"
name      = "Cypress binary cache"
ecosystem = "testing"
enabled   = false
paths     = ["~/.cache/Cypress"]

[[global_cache]]
id        = "deno"
