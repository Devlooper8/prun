# prun-rules.toml
#
# Detection ruleset for Prun — the project artifact cleaner.
# Everything listed here is REGENERATABLE: deleting it costs build time, not data.
#
# How a rule works:
#   - Prun walks the scan root. A directory is treated as a "project root" for a
#     rule if ANY of that rule's `markers` exists directly inside it.
#   - At that root, every entry in `dirs` (exact directory names) and `globs`
#     (file/dir glob patterns, matched recursively) becomes a reclaim candidate.
#   - `reclaim_root = true` means the marked directory ITSELF is the artifact —
#     used when a directory is identified by a file it contains (e.g. a virtualenv
#     is any directory holding a pyvenv.cfg, whatever it's named).
#   - `ecosystem` is the grouping key shown in the sidebar.
#
# [[junk]] entries are marker-less: they have no project root and are matched in
# EVERY directory under the scan root (still subject to the git guard + age gate).
# Use them for cross-cutting generated metadata that isn't tied to one build system
# (OS cruft, editor swap files, code-index databases).
#
# Safety (applied to EVERY candidate, on top of per-rule settings):
#   - skip_git_tracked  -> a path that `git` is currently tracking is never touched.
#                          This is what makes including `dist`/`vendor`/`build` safe:
#                          if you committed it on purpose, Prun leaves it alone.
#   - min_age_days       -> a path whose newest file is younger than this is skipped,
#                           so the cache of a project you're actively building survives.
#   - respect_ignorefile -> honors a project-local .prunignore.
#   - default action is Trash (recoverable), not unlink.
#
# Rules with `enabled = false` are off by default because the candidate is either
# commonly committed on purpose, slow/expensive to regenerate, or close enough to
# source that it deserves an explicit opt-in. The git guard still applies on top.

schema_version = 3

[defaults]
min_age_days       = 14
skip_git_tracked   = true
respect_ignorefile = true
move_to_trash      = true

# Global ignore — never descend into or delete these regardless of rule.
global_ignore = [".git", ".hg", ".svn", ".jj"]


# ─────────────────────────────────────────────────────────────────────────────
# Systems / compiled languages
# ─────────────────────────────────────────────────────────────────────────────

[[rule]]
id        = "rust-cargo"
name      = "Rust (Cargo)"
ecosystem = "rust"
markers   = ["Cargo.toml"]
dirs      = ["target"]

[[rule]]
id        = "go"
name      = "Go (vendored deps)"
ecosystem = "go"
markers   = ["go.mod"]
dirs      = ["vendor"]
enabled   = false
note      = "Go's real build cache is global (~/.cache/go-build, ~/go/pkg/mod). vendor/ is often committed deliberately, so this is opt-in even with the git guard."

[[rule]]
id        = "cmake"
name      = "C/C++ (CMake)"
ecosystem = "cpp"
markers   = ["CMakeLists.txt"]
dirs      = ["build", "_build", "out", "cmake-build-debug", "cmake-build-release", "cmake-build-relwithdebinfo"]
globs     = ["CMakeFiles", "CMakeCache.txt", "cmake_install.cmake", "CTestTestfile.cmake", "compile_commands.json"]
note      = "The globs catch in-source configures, where artifacts land next to source instead of in build/. None of them are ever committed legitimately."

[[rule]]
id           = "cmake-build"
name         = "C/C++ (CMake build tree)"
ecosystem    = "cpp"
markers      = ["CMakeCache.txt"]
anti_markers = ["CMakeLists.txt"]
reclaim_root = true
note         = "A CMake build tree is ANY directory holding a generated CMakeCache.txt, whatever it's named (cmake-build-debug, cmake-build-minsizerel-system, out/, an arbitrary CLion suffix, …). This reclaims the whole directory as one entry instead of fragmenting it into CMakeFiles/, CMakeCache.txt and build.ninja listed separately. anti_markers guards the in-source case: a directory that ALSO holds the source CMakeLists.txt is your project root, not a build tree, so it's left alone here — its loose artifacts are caught file-by-file by the cmake rule's globs above."

[[rule]]
id        = "meson"
name      = "C/C++ (Meson)"
ecosystem = "cpp"
markers   = ["meson.build"]
dirs      = ["build", "builddir", "_build"]

[[rule]]
id        = "make-objects"
name      = "C/C++ (Make objects)"
ecosystem = "cpp"
markers   = ["Makefile", "makefile", "configure.ac"]
globs     = ["*.o", "*.obj", "*.lo", "*.la", "*.ko"]
enabled   = false
note      = "Loose object files sit next to source; relies entirely on the git guard. Opt-in."

[[rule]]
id        = "cpp-generated"
name      = "C/C++ (coverage & precompiled headers)"
ecosystem = "cpp"
markers   = ["CMakeLists.txt", "Makefile", "makefile", "meson.build", "configure.ac"]
globs     = ["*.gcda", "*.gcno", "*.gcov", "*.profraw", "*.profdata", "*.gch", "*.pch"]
note      = "gcov/llvm-cov coverage data and precompiled headers — unambiguously generated, never committed. *.d depfiles are deliberately excluded (collides with D-language source)."

[[rule]]
id        = "ninja"
name      = "Ninja (generated build files)"
ecosystem = "cpp"
markers   = ["build.ninja"]
globs     = ["build.ninja", "rules.ninja", ".ninja_log", ".ninja_deps"]
note      = "build.ninja itself is generated by CMake/Meson/GN. Out-of-source builds are already covered by removing build/; this catches Ninja run directly or configured in-source."

[[rule]]
id        = "autotools"
name      = "Autotools (configure/make output)"
ecosystem = "cpp"
markers   = ["configure.ac", "configure.in", "Makefile.am"]
dirs      = ["autom4te.cache"]
globs     = [".deps", ".libs", "config.status", "config.log", "config.cache", "stamp-h1", "libtool"]
note      = ".deps/ and .libs/ are matched recursively (automake drops them in every source subdir). The committed configure/Makefile.in/aclocal.m4 are left alone by the git guard."

[[rule]]
id        = "bazel"
name      = "Bazel"
ecosystem = "bazel"
markers   = ["WORKSPACE", "WORKSPACE.bazel", "MODULE.bazel"]
globs     = ["bazel-*"]
note      = "bazel-bin / bazel-out / bazel-testlogs etc. are convenience symlinks into the global Bazel cache (~/.cache/bazel, see global_cache). Removing the symlinks is safe and instant."

[[rule]]
id        = "buck2"
name      = "Buck2"
ecosystem = "bazel"
markers   = [".buckconfig"]
dirs      = ["buck-out"]

[[rule]]
id        = "scons"
name      = "SCons"
ecosystem = "cpp"
markers   = ["SConstruct"]
dirs      = [".sconf_temp"]
globs     = [".sconsign.dblite"]

[[rule]]
id        = "zig"
name      = "Zig"
ecosystem = "zig"
markers   = ["build.zig"]
dirs      = ["zig-cache", ".zig-cache", "zig-out"]

[[rule]]
id        = "nim"
name      = "Nim"
ecosystem = "nim"
markers   = ["*.nimble", "config.nims"]
dirs      = ["nimcache"]

[[rule]]
id        = "swift-spm"
name      = "Swift (SwiftPM)"
ecosystem = "swift"
markers   = ["Package.swift"]
dirs      = [".build"]

[[rule]]
id        = "dotnet"
name      = ".NET (C#/F#/VB)"
ecosystem = "dotnet"
markers   = ["*.csproj", "*.fsproj", "*.vbproj", "*.sln"]
dirs      = ["bin", "obj"]

[[rule]]
id        = "cocoapods"
name      = "CocoaPods"
ecosystem = "swift"
markers   = ["Podfile"]
dirs      = ["Pods"]
note      = "Regeneratable via `pod install`, but slow. Xcode DerivedData is global (see global_cache)."


# ─────────────────────────────────────────────────────────────────────────────
# JVM
# ─────────────────────────────────────────────────────────────────────────────

[[rule]]
id        = "maven"
name      = "Java/Kotlin (Maven)"
ecosystem = "jvm"
markers   = ["pom.xml"]
dirs      = ["target"]

[[rule]]
id        = "gradle"
name      = "Java/Kotlin/Android (Gradle)"
ecosystem = "jvm"
markers   = ["build.gradle", "build.gradle.kts", "settings.gradle", "settings.gradle.kts"]
dirs      = ["build", ".gradle", ".cxx", "captures"]
note      = ".cxx and captures are Android-specific build output; harmless elsewhere because they won't exist."

[[rule]]
id        = "sbt"
name      = "Scala (sbt)"
ecosystem = "jvm"
markers   = ["build.sbt"]
dirs      = ["target", "project/target", "project/project/target"]


# ─────────────────────────────────────────────────────────────────────────────
# Web / JavaScript / TypeScript
# ─────────────────────────────────────────────────────────────────────────────

[[rule]]
id        = "node-modules"
name      = "Node.js (dependencies)"
ecosystem = "node"
markers   = ["package.json"]
dirs      = ["node_modules"]
note      = "Matches npm/yarn/pnpm/bun. Nested workspace node_modules are caught because each has its own package.json."

[[rule]]
id        = "nextjs"
name      = "Next.js"
ecosystem = "node"
markers   = ["next.config.js", "next.config.mjs", "next.config.ts"]
dirs      = [".next", ".vercel", "out"]

[[rule]]
id        = "nuxt"
name      = "Nuxt"
ecosystem = "node"
markers   = ["nuxt.config.js", "nuxt.config.ts", "nuxt.config.mjs"]
dirs      = [".nuxt", ".output", ".nitro"]

[[rule]]
id        = "vite"
name      = "Vite"
ecosystem = "node"
markers   = ["vite.config.js", "vite.config.ts", "vite.config.mjs"]
dirs      = ["dist", ".vite"]

[[rule]]
id        = "sveltekit"
name      = "SvelteKit"
ecosystem = "node"
markers   = ["svelte.config.js", "svelte.config.ts"]
dirs      = [".svelte-kit"]

[[rule]]
id        = "astro"
name      = "Astro"
ecosystem = "node"
markers   = ["astro.config.mjs", "astro.config.ts", "astro.config.js"]
dirs      = [".astro", "dist"]

[[rule]]
id        = "angular"
name      = "Angular"
ecosystem = "node"
markers   = ["angular.json"]
dirs      = [".angular", "dist"]

[[rule]]
id        = "gatsby"
name      = "Gatsby"
ecosystem = "node"
markers   = ["gatsby-config.js", "gatsby-config.ts"]
dirs      = [".cache"]
note      = "public/ is deliberately excluded — for Gatsby it's build output, but the name collides with source-asset dirs elsewhere. Too risky to delete by name."

[[rule]]
id        = "turbo"
name      = "Turborepo"
ecosystem = "node"
markers   = ["turbo.json"]
dirs      = [".turbo"]

[[rule]]
id        = "js-tooling-caches"
name      = "JS tooling caches"
ecosystem = "node"
markers   = ["package.json"]
dirs      = ["coverage", ".nyc_output", ".parcel-cache", ".rollup.cache"]
globs     = ["*.tsbuildinfo", ".eslintcache", ".stylelintcache"]


# ─────────────────────────────────────────────────────────────────────────────
# Python
# ─────────────────────────────────────────────────────────────────────────────

[[rule]]
id           = "python-venv"
name         = "Python virtualenv"
ecosystem    = "python"
markers      = ["pyvenv.cfg"]
reclaim_root = true
note         = "A venv is any directory containing pyvenv.cfg — this catches every venv from python -m venv, virtualenv, uv, poetry, pdm and hatch regardless of name (.venv, venv, env, .direnv-managed, whatever). Far more reliable than guessing directory names. Conda envs use conda-meta/ instead and live globally, so they're not matched here."

[[rule]]
id        = "python"
name      = "Python (tool caches & build output)"
ecosystem = "python"
markers   = ["pyproject.toml", "setup.py", "setup.cfg", "requirements.txt", "Pipfile", "pdm.lock", "uv.lock", "poetry.lock"]
dirs      = [".tox", ".nox", ".pytest_cache", ".mypy_cache", ".pytype", ".pyre", ".ruff_cache", ".hypothesis", ".benchmarks", "htmlcov", ".eggs", "__pypackages__", ".pdm-build", "pip-wheel-metadata", ".scrapy", ".ropeproject", "cython_debug", ".webassets-cache", "build", "dist"]
globs     = ["__pycache__", "*.egg-info", "*.egg", "*.pyc", "*.pyo", ".coverage", ".coverage.*", ".dmypy.json", ".pdm-python", ".ipynb_checkpoints"]
note      = "Covers pip/uv/poetry/pdm/pipenv/hatch — they share pyproject.toml/lockfiles as markers. Lockfiles (uv.lock, poetry.lock, pdm.lock, Pipfile.lock) are markers, never deleted: they pin versions and are not regeneratable. __pycache__, *.egg-info and .coverage.* are matched recursively. Virtualenvs are handled by the python-venv rule above."

[[rule]]
id        = "python-native-ext"
name      = "Python in-place C extensions"
ecosystem = "python"
markers   = ["setup.py", "pyproject.toml"]
globs     = ["*.so", "*.pyd"]
enabled   = false
note      = "Compiled extensions built in-place (Cython/CFFI/C). Off by default: *.so/*.pyd are also legitimately vendored, so this leans entirely on the git guard. Cython's generated *.c is deliberately NOT matched — it collides with hand-written C source."


# ─────────────────────────────────────────────────────────────────────────────
# PHP / Ruby
# ─────────────────────────────────────────────────────────────────────────────

[[rule]]
id        = "composer"
name      = "PHP (Composer)"
ecosystem = "php"
markers   = ["composer.json"]
dirs      = ["vendor"]
globs     = [".phpunit.result.cache"]

[[rule]]
id        = "laravel"
name      = "Laravel (framework caches)"
ecosystem = "php"
markers   = ["artisan"]
dirs      = ["storage/framework/cache/data", "storage/framework/sessions", "storage/framework/views", "bootstrap/cache"]
note      = "Logs (storage/logs) are intentionally NOT included — they're disposable but not regeneratable."

[[rule]]
id        = "bundler"
name      = "Ruby (Bundler)"
ecosystem = "ruby"
markers   = ["Gemfile"]
dirs      = ["vendor/bundle", ".bundle"]

[[rule]]
id        = "rails"
name      = "Ruby on Rails (caches)"
ecosystem = "ruby"
markers   = ["config/application.rb"]
dirs      = ["tmp/cache", "tmp/pids", "public/assets", "public/packs"]


# ─────────────────────────────────────────────────────────────────────────────
# Mobile / cross-platform
# ─────────────────────────────────────────────────────────────────────────────

[[rule]]
id        = "flutter"
name      = "Dart / Flutter"
ecosystem = "dart"
markers   = ["pubspec.yaml"]
dirs      = [".dart_tool", "build", "ios/Pods", "macos/Pods"]
globs     = [".flutter-plugins", ".flutter-plugins-dependencies", ".packages"]


# ─────────────────────────────────────────────────────────────────────────────
# Functional / other languages
# ─────────────────────────────────────────────────────────────────────────────

[[rule]]
id        = "elixir"
name      = "Elixir (Mix)"
ecosystem = "beam"
markers   = ["mix.exs"]
dirs      = ["_build", "deps", ".elixir_ls", "cover"]

[[rule]]
id        = "rebar"
name      = "Erlang (Rebar3)"
ecosystem = "beam"
markers   = ["rebar.config"]
dirs      = ["_build"]

[[rule]]
id        = "haskell-cabal"
name      = "Haskell (Cabal)"
ecosystem = "haskell"
markers   = ["cabal.project", "*.cabal"]
dirs      = ["dist-newstyle", "dist"]

[[rule]]
id        = "haskell-stack"
name      = "Haskell (Stack)"
ecosystem = "haskell"
markers   = ["stack.yaml"]
dirs      = [".stack-work"]

[[rule]]
id        = "crystal"
name      = "Crystal (Shards)"
ecosystem = "crystal"
markers   = ["shard.yml"]
dirs      = ["lib", ".crystal"]
enabled   = false
note      = "Crystal puts deps in lib/, but lib/ is a source dir in many other languages. Opt-in, and only ever fires when shard.yml is present."


# ─────────────────────────────────────────────────────────────────────────────
# Game engines
# ─────────────────────────────────────────────────────────────────────────────

[[rule]]
id        = "unity"
name      = "Unity"
ecosystem = "gamedev"
markers   = ["ProjectSettings/ProjectVersion.txt"]
dirs      = ["Library", "Temp", "Obj", "Logs", "Build", "Builds", "MemoryCaptures", "UserSettings"]
note      = "Library/ is huge and fully regenerated on next open."

[[rule]]
id        = "unreal"
name      = "Unreal Engine"
ecosystem = "gamedev"
markers   = ["*.uproject"]
dirs      = ["Binaries", "Intermediate", "DerivedDataCache", ".vs"]
note      = "Saved/ is excluded — it holds logs, screenshots and some user config, not pure build output."

[[rule]]
id        = "godot"
name      = "Godot"
ecosystem = "gamedev"
markers   = ["project.godot"]
dirs      = [".godot", ".import"]


# ─────────────────────────────────────────────────────────────────────────────
# Infra / tooling
# ─────────────────────────────────────────────────────────────────────────────

[[rule]]
id        = "terraform"
name      = "Terraform"
ecosystem = "infra"
markers   = ["*.tf"]
dirs      = [".terraform"]
note      = "Provider plugins, regenerated via `terraform init`. The .terraform.lock.hcl lockfile is left untouched."

[[rule]]
id        = "terragrunt"
name      = "Terragrunt"
ecosystem = "infra"
markers   = ["terragrunt.hcl"]
dirs      = [".terragrunt-cache"]

[[rule]]
id        = "serverless"
name      = "Serverless Framework"
ecosystem = "infra"
markers   = ["serverless.yml", "serverless.yaml", "serverless.ts"]
dirs      = [".serverless"]

[[rule]]
id        = "aws-sam"
name      = "AWS SAM"
ecosystem = "infra"
markers   = ["samconfig.toml"]
dirs      = [".aws-sam"]

[[rule]]
id        = "aws-cdk"
name      = "AWS CDK"
ecosystem = "infra"
markers   = ["cdk.json"]
dirs      = ["cdk.out"]

[[rule]]
id        = "vagrant"
name      = "Vagrant"
ecosystem = "infra"
markers   = ["Vagrantfile"]
dirs      = [".vagrant"]


# ─────────────────────────────────────────────────────────────────────────────
# Cross-language tooling — used regardless of the project's language
# ─────────────────────────────────────────────────────────────────────────────

[[rule]]
id        = "latex"
name      = "LaTeX (auxiliary output)"
ecosystem = "latex"
markers   = ["*.tex"]
globs     = ["*.aux", "*.fls", "*.fdb_latexmk", "*.synctex.gz", "*.toc", "*.lof", "*.lot", "*.bbl", "*.blg", "*.nav", "*.snm", "*.vrb", "*.idx", "*.ilg", "*.ind", "*.out"]
note      = "Everything here regenerates from the .tex on the next build. The .tex, .bib and figures are never matched."

[[rule]]
id        = "nix"
name      = "Nix (build result links)"
ecosystem = "nix"
markers   = ["flake.nix", "default.nix", "shell.nix"]
globs     = ["result", "result-*"]
note      = "result is a symlink into /nix/store — remove the link, never follow it. The store itself is managed by nix-collect-garbage, never by Prun."

[[rule]]
id        = "direnv"
name      = "direnv"
ecosystem = "nix"
markers   = [".envrc"]
dirs      = [".direnv"]

[[rule]]
id        = "nx"
name      = "Nx (monorepo cache)"
ecosystem = "node"
markers   = ["nx.json"]
dirs      = [".nx/cache", ".nx/workspace-data"]

[[rule]]
id        = "storybook"
name      = "Storybook"
ecosystem = "node"
markers   = [".storybook"]
dirs      = ["storybook-static"]

[[rule]]
id        = "conan"
name      = "Conan (C/C++ deps)"
ecosystem = "cpp"
markers   = ["conanfile.txt", "conanfile.py"]
globs     = ["conanbuildinfo.*", "conaninfo.txt", "conan.lock", "graph_info.json", "conanrun.*", "conanbuild.*", "deactivate_conan*"]

[[rule]]
id        = "vcpkg"
name      = "vcpkg (C/C++ deps)"
ecosystem = "cpp"
markers   = ["vcpkg.json"]
dirs      = ["vcpkg_installed"]

[[rule]]
id        = "dvc"
name      = "DVC (data version control)"
ecosystem = "data"
markers   = [".dvc"]
dirs      = [".dvc/cache", ".dvc/tmp"]
note      = "Only the local cache/tmp — tracked data and .dvc pointer files are left alone."


# ─────────────────────────────────────────────────────────────────────────────
# Documentation / static-site generators
# ─────────────────────────────────────────────────────────────────────────────

[[rule]]
id        = "mkdocs"
name      = "MkDocs"
ecosystem = "docs"
markers   = ["mkdocs.yml"]
dirs      = ["site"]

[[rule]]
id        = "jekyll"
name      = "Jekyll"
ecosystem = "docs"
markers   = ["_config.yml"]
dirs      = ["_site", ".jekyll-cache", ".sass-cache"]

[[rule]]
id        = "hugo"
name      = "Hugo"
ecosystem = "docs"
markers   = ["hugo.toml", "hugo.yaml", "hugo.json"]
dirs      = ["resources/_gen"]
note      = "public/ is the default output but the name collides with source dirs elsewhere, so only the safe resources/_gen cache is reclaimed by default."


# ─────────────────────────────────────────────────────────────────────────────
# Testing / E2E / quality
# ─────────────────────────────────────────────────────────────────────────────

[[rule]]
id        = "playwright"
name      = "Playwright"
ecosystem = "testing"
markers   = ["playwright.config.ts", "playwright.config.js"]
dirs      = ["test-results", "playwright-report", "blob-report"]

[[rule]]
id        = "cypress"
name      = "Cypress"
ecosystem = "testing"
markers   = ["cypress.config.js", "cypress.config.ts", "cypress.json"]
dirs      = ["cypress/screenshots", "cypress/videos", "cypress/downloads"]

[[rule]]
id        = "sonarqube"
name      = "SonarQube scanner"
ecosystem = "testing"
markers   = ["sonar-project.properties"]
dirs      = [".scannerwork"]


# ─────────────────────────────────────────────────────────────────────────────
# Marker-less junk — matched in every directory under the scan root
# ─────────────────────────────────────────────────────────────────────────────

[[junk]]
id        = "os-cruft"
name      = "OS metadata"
ecosystem = "junk"
globs     = [".DS_Store", "._*", "Thumbs.db", "ehthumbs.db", "desktop.ini"]

[[junk]]
id        = "editor-swap"
name      = "Editor swap & backups"
ecosystem = "junk"
globs     = ["*.swp", "*.swo", "*~", "*.orig"]
note      = "Vim swap (.swp/.swo) and emacs/gedit backups (*~). *.orig is a merge-conflict leftover."

[[junk]]
id        = "code-index"
name      = "Code-index databases"
ecosystem = "editor"
dirs      = [".cache/clangd", ".ccls-cache", ".cache/ccls"]
globs     = ["cscope.out", "cscope.in.out", "cscope.po.out", "GPATH", "GTAGS", "GRTAGS"]
note      = "clangd/ccls indexes and cscope/GNU-global databases. All rebuilt on demand by the editor/LSP."

[[junk]]
id        = "ctags"
name      = "ctags tag files"
ecosystem = "editor"
globs     = ["tags", "TAGS"]
enabled   = false
note      = "The filename 'tags' collides with legitimate files/dirs in some projects (e.g. web templates), so it's opt-in. The git guard still protects committed ones."


# ─────────────────────────────────────────────────────────────────────────────
# Global / shared caches  (per-user, not per-project)
#
# These are reclaimable but shared across ALL your projects, and re-downloading
# can be slow/network-heavy. All OFF by default — surface them in a separate
# "System caches" view, never mixed into a project scan.
# ─────────────────────────────────────────────────────────────────────────────

[[global_cache]]
id        = "cargo"
name      = "Cargo registry & git cache"
ecosystem = "rust"
enabled   = false
paths     = ["~/.cargo/registry/cache", "~/.cargo/registry/src", "~/.cargo/git/checkouts"]

[[global_cache]]
id        = "go"
name      = "Go build & module cache"
ecosystem = "go"
enabled   = false
paths     = ["~/.cache/go-build", "~/go/pkg/mod"]
note      = "Module cache is read-only; clearing forces full re-download of all deps."

[[global_cache]]
id        = "npm"
name      = "npm cache"
ecosystem = "node"
enabled   = false
paths     = ["~/.npm/_cacache"]

[[global_cache]]
id        = "pnpm"
name      = "pnpm content store"
ecosystem = "node"
enabled   = false
paths     = ["~/.local/share/pnpm/store", "~/.pnpm-store"]

[[global_cache]]
id        = "yarn"
name      = "Yarn cache"
ecosystem = "node"
enabled   = false
paths     = ["~/.cache/yarn", "~/.yarn/cache"]

[[global_cache]]
id        = "pip-uv"
name      = "pip / uv cache"
ecosystem = "python"
enabled   = false
paths     = ["~/.cache/pip", "~/.cache/uv"]

[[global_cache]]
id        = "poetry"
name      = "Poetry cache & managed venvs"
ecosystem = "python"
enabled   = false
paths     = ["~/.cache/pypoetry"]
note      = "Includes ~/.cache/pypoetry/virtualenvs — Poetry's default (non-in-project) venvs. Recreated by `poetry install`."

[[global_cache]]
id        = "pipenv"
name      = "Pipenv managed venvs & cache"
ecosystem = "python"
enabled   = false
paths     = ["~/.local/share/virtualenvs", "~/.cache/pipenv"]
note      = "Pipenv's default venv location (unless PIPENV_VENV_IN_PROJECT is set). Recreated by `pipenv install`."

[[global_cache]]
id        = "hatch"
name      = "Hatch managed environments"
ecosystem = "python"
enabled   = false
paths     = ["~/.local/share/hatch/env", "~/.cache/hatch"]

[[global_cache]]
id        = "conda-pkgs"
name      = "Conda/Mamba package cache"
ecosystem = "python"
enabled   = false
paths     = ["~/.conda/pkgs", "~/miniconda3/pkgs", "~/anaconda3/pkgs"]
note      = "The downloaded-package cache only, not your envs. Path depends on your install prefix; `conda clean -p` is the official equivalent."

[[global_cache]]
id        = "gradle"
name      = "Gradle cache"
ecosystem = "jvm"
enabled   = false
paths     = ["~/.gradle/caches"]

[[global_cache]]
id        = "maven"
name      = "Maven local repository"
ecosystem = "jvm"
enabled   = false
paths     = ["~/.m2/repository"]
note      = "Large and slow to rebuild; clear only when you really mean it."

[[global_cache]]
id        = "composer"
name      = "Composer cache"
ecosystem = "php"
enabled   = false
paths     = ["~/.cache/composer", "~/.composer/cache"]

[[global_cache]]
id        = "ccache"
name      = "ccache (C/C++ compiler cache)"
ecosystem = "cpp"
enabled   = false
paths     = ["~/.cache/ccache"]

[[global_cache]]
id        = "bazel"
name      = "Bazel output base"
ecosystem = "bazel"
enabled   = false
paths     = ["~/.cache/bazel"]
note      = "Where the bazel-* symlinks actually point; can grow to many GB across workspaces."

[[global_cache]]
id        = "xcode-deriveddata"
name      = "Xcode DerivedData"
ecosystem = "swift"
enabled   = false
platform  = "macos"
paths     = ["~/Library/Developer/Xcode/DerivedData"]

[[global_cache]]
id        = "sccache"
name      = "sccache (shared compiler cache)"
ecosystem = "rust"
enabled   = false
paths     = ["~/.cache/sccache"]

[[global_cache]]
id        = "pre-commit"
