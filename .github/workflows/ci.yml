name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (build · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check & build
        run: npm run build # tsc --noEmit && vite build
      - name: Unit tests
        run: npm test # vitest run

  rust:
    name: Rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  rust-windows:
    name: Rust (Windows test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Tests # exercises the cfg(windows) paths (norm_seg, remove_path)
        run: cargo test --manifest-path src-tauri/Cargo.toml

  audit:
    name: Security audit (advisory)
    runs-on: ubuntu-latest
    # Advisory only: a new upstream CVE shouldn't block merging unrelated work.
    # Review failures here and bump deps; promote to required once deps are pinned.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: npm audit (high and up)
        run: npm audit --audit-level=high
        continue-on-error: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit --file src-tauri/Cargo.lock
        continue-on-error: true
