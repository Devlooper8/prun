name: Pages

# Build the public landing page and the browser-safe sample-data demo, then
# publish both through GitHub's artifact-based Pages deployment flow.
on:
  push:
    branches: [main]
    paths:
      - ".github/media/demo.gif"
      - ".github/workflows/pages.yml"
      - "index.html"
      - "package-lock.json"
      - "package.json"
      - "site/**"
      - "src/**"
      - "vite.config.ts"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build interactive demo
        run: npm run build
      - name: Assemble Pages site
        run: |
          mkdir -p _site/assets _site/demo
          cp -R site/. _site/
          cp .github/media/demo.gif _site/assets/demo.gif
          cp -R dist/. _site/demo/
          touch _site/.nojekyll
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
          include-hidden-files: true

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
