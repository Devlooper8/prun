name: Release

# Build signed installers for every platform and open a draft GitHub Release when
# a version tag is pushed (e.g. `git tag v0.2.0 && git push origin v0.2.0`).
# Signing + updater secrets are optional: without them you still get working
# (unsigned) installers. See RELEASING.md for the full secret list.
#
# Supply-chain extras (no secrets needed):
#  - every bundle gets a build-provenance attestation, verifiable with
#    `gh attestation verify <file> --repo <owner>/prun`
#  - the ubuntu leg uploads a CycloneDX SBOM as a workflow artifact; attach it
#    to the release when publishing the draft (RELEASING.md)
# Actions are pinned to commit SHAs; Dependabot keeps the pins fresh.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # build-provenance attestation (sigstore OIDC)
  attestations: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — required only if you enable the updater (RELEASING.md).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS Developer ID signing + notarization (optional; leave unset to skip).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Prun ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for what changed."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          # Each platform leg matches only its own bundle types; `**` covers
          # both target layouts (release/ and universal-apple-darwin/release/).
          subject-path: |
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*-setup.exe
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.dmg

      - name: Generate SBOM (CycloneDX)
        if: matrix.platform == 'ubuntu-latest'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          # Lockfile-driven (Cargo.lock + package-lock.json), so one leg is
          # representative; platform-conditional deps differ only marginally.
          path: .
          format: cyclonedx-json
          output-file: prun-${{ github.ref_name }}-sbom.cdx.json
          upload-release-assets: false

      - name: Upload SBOM artifact
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: prun-${{ github.ref_name }}-sbom
          path: prun-${{ github.ref_name }}-sbom.cdx.json
