name: Feature request
description: Propose a change or a new capability.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what's annoying?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: rules-first
    attributes:
      label: Rules first
      description: >-
        New artifact directories, marker files, and categories are data — they
        go in `prun-rules.toml`, not code.
      options:
        - label: I considered whether this could be a `rules.toml` addition instead of code
