name: Bug report
description: Something broke, mis-detected, or offered to delete the wrong thing.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened / what you expected
      description: >-
        If Prun deleted (or offered to delete) something it shouldn't have,
        say so up front — that's a priority bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Scan ~/Projects
        2. Enable "Untouched > 30 days"
        3. ...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      description: Add the exact OS version in the description above if it seems relevant.
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Prun version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: dropdown
    id: rules-override
    attributes:
      label: Rules override present?
      description: >-
        Is there a `rules.toml` at `%APPDATA%\prun\rules.toml` (Windows) or
        `~/.config/prun/rules.toml` (Linux/macOS)? An override replaces the
        embedded ruleset, so detection bugs may live there rather than in the
        app. If yes, paste the relevant rule below.
      options:
        - "No"
        - "Yes"
        - Not sure
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Log excerpt
      description: >-
        Logs are daily-rotated files in the OS data dir under `prun/logs`.
        Re-run with `PRUN_LOG=debug` for more detail and paste the relevant
        lines.
      render: text
