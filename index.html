<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prun</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app">
      <!-- ── Title bar ───────────────────────────────────────────── -->
      <header class="titlebar" data-tauri-drag-region>
        <div class="titlebar__brand" data-tauri-drag-region>
          <span class="titlebar__name">Prun</span>
          <span class="titlebar__sub">— project artifact cleaner</span>
        </div>
        <div class="titlebar__controls">
          <button class="wbtn" data-win="minimize" aria-label="Minimize" title="Minimize">
            <svg viewBox="0 0 12 12" width="12" height="12"><path d="M2 6h8" /></svg>
          </button>
          <button class="wbtn" data-win="maximize" aria-label="Maximize" title="Maximize">
            <svg viewBox="0 0 12 12" width="12" height="12"><rect x="2.5" y="2.5" width="7" height="7" rx="1" /></svg>
          </button>
          <button class="wbtn wbtn--close" data-win="close" aria-label="Close" title="Close">
            <svg viewBox="0 0 12 12" width="12" height="12"><path d="M3 3l6 6M9 3l-6 6" /></svg>
          </button>
        </div>
      </header>

      <div class="shell">
        <!-- ── Left nav rail ─────────────────────────────────────── -->
        <nav class="nav">
          <button class="nav__item is-active" data-view="clean">
            <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="11" cy="11" r="7" /><path d="M21 21l-4.8-4.8" /></svg>
            <span>Clean</span>
          </button>
          <button class="nav__item" data-view="rules">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 4v5M6 13v7M12 4v9M12 15v5M18 4v3M18 11v9" /><circle cx="6" cy="11" r="2" /><circle cx="12" cy="13" r="2" /><circle cx="18" cy="9" r="2" /></svg>
            <span>Rules</span>
          </button>
          <div class="nav__spacer"></div>
          <!-- An action, not a view: no data-view, so the view switcher ignores it. -->
          <button class="nav__item" id="open-logs" title="Open the folder with log files and crash reports">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" /><path d="M14 3v5h5M9 13h6M9 17h6" /></svg>
            <span>Logs</span>
          </button>
        </nav>

        <div class="main">
          <!-- ══ Clean view ═══════════════════════════════════════ -->
          <section id="view-clean" class="view">
            <!-- Path + rescan -->
            <section class="pathbar">
              <div class="field">
                <svg class="field__icon" viewBox="0 0 24 24" width="16" height="16">
                  <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                </svg>
                <input id="root" type="text" spellcheck="false" value="~/Projects" autocomplete="off" />
                <ul id="recent-roots" class="recent" role="listbox" hidden></ul>
              </div>
              <button id="rescan" class="btn btn--primary">
                <svg viewBox="0 0 24 24" width="15" height="15"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 4v5h-5" /></svg>
                <span>Scan</span>
              </button>
              <button id="caches" class="btn btn--ghost" title="Scan per-user system caches (Cargo, npm, Gradle, …)">
                <svg viewBox="0 0 24 24" width="15" height="15"><ellipse cx="12" cy="5.5" rx="7.5" ry="3" /><path d="M4.5 5.5v13c0 1.66 3.36 3 7.5 3s7.5-1.34 7.5-3v-13M4.5 12c0 1.66 3.36 3 7.5 3s7.5-1.34 7.5-3" /></svg>
                <span>System caches</span>
              </button>
            </section>

            <!-- Filter pills -->
            <section class="filters">
              <button class="pill" data-filter="age" aria-pressed="false">
                <svg viewBox="0 0 24 24" width="15" height="15"><circle cx="12" cy="12" r="8.5" /><path d="M12 7v5l3.5 2" /></svg>
                <span>Untouched &gt; <input id="age-days" class="pill__num" value="14" inputmode="numeric" /> days</span>
              </button>
              <button class="pill" data-filter="size" aria-pressed="false">
                <svg viewBox="0 0 24 24" width="15" height="15"><path d="M3 5h18l-7 8v6l-4-2v-4z" /></svg>
                <span>Hide &lt; <input id="size-mb" class="pill__num" value="50" inputmode="numeric" /> MB</span>
              </button>
              <button class="pill" data-filter="git" aria-pressed="false">
                <svg viewBox="0 0 24 24" width="15" height="15"><circle cx="6" cy="6" r="2.4" /><circle cx="6" cy="18" r="2.4" /><circle cx="18" cy="8" r="2.4" /><path d="M6 8.4v7.2M8.4 6H14a3 3 0 0 1 3 3v.6" /></svg>
                <span>Skip git-tracked</span>
              </button>
              <button class="pill" data-filter="prunignore" aria-pressed="false">
                <svg viewBox="0 0 24 24" width="15" height="15"><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z" /></svg>
                <span>Respect .prunignore</span>
              </button>
            </section>

            <!-- Body: categories + projects -->
            <section class="body">
              <aside class="cats">
                <div class="cats__head">Categories</div>
                <ul id="cats-list" class="cats__list"></ul>
              </aside>

              <div class="locs">
                <div class="locs__head">
                  <span id="locs-title">Largest reclaimable projects</span>
                  <span id="locs-size" class="locs__size">0 B / 0 B</span>
                </div>
                <div id="scanbar" class="scanbar" hidden>
                  <div class="scanbar__head">
                    <span id="scan-root" class="scanbar__root"></span>
                    <span id="scan-pct" class="scanbar__pct"></span>
                    <button id="scan-cancel" class="scanbar__cancel" type="button" title="Cancel scan">Cancel</button>
                  </div>
                  <div class="scanbar__track"><div id="scan-fill" class="scanbar__fill"></div></div>
                </div>
                <ul id="locs-list" class="locs__list"></ul>
              </div>
            </section>

            <!-- Footer -->
            <footer class="footer">
              <div class="footer__sel">
                <span class="footer__label">Selected · <span id="sel-count">0</span> artifacts</span>
                <span id="sel-size" class="footer__total">0 B</span>
              </div>
              <div class="footer__actions">
                <label class="trash">
                  <input id="trash" type="checkbox" checked />
                  <span class="trash__box">
                    <svg viewBox="0 0 24 24" width="13" height="13"><path d="M4 5l16 0M9 5V3.5A1.5 1.5 0 0 1 10.5 2h3A1.5 1.5 0 0 1 15 3.5V5m3 0l-1 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L6 5" /></svg>
                  </span>
                  <span class="trash__txt">Move to Trash</span>
                </label>
                <button id="clean" class="btn btn--primary">
                  <span>Clean selected</span>
                  <svg viewBox="0 0 24 24" width="15" height="15"><path d="M7 17L17 7M9 7h8v8" /></svg>
                </button>
              </div>
            </footer>
          </section>

          <!-- ══ Rules view (master–detail) ═══════════════════════ -->
          <section id="view-rules" class="view" hidden>
            <header class="reditor__head">
              <div class="reditor__headmain">
                <div class="reditor__titlewrap">
                  <span class="reditor__title">Detection rules</span>
                  <span id="re-unsaved" class="reditor__unsaved" hidden>● unsaved</span>
                </div>
                <div class="reditor__actions">
                  <button id="re-openfile" class="btn btn--ghost">Open file…</button>
                  <button id="re-reset" class="btn btn--ghost">Reset to defaults</button>
                  <button id="re-save" class="btn btn--primary">Save</button>
                </div>
              </div>
              <div id="re-status" class="reditor__status"></div>
            </header>

            <nav class="reditor__tabs">
              <button class="pill reditor__tab is-active" data-section="rule">Rules</button>
              <button class="pill reditor__tab" data-section="junk">Junk</button>
              <button class="pill reditor__tab" data-section="global_cache">System caches</button>
              <button class="pill reditor__tab" data-section="defaults">Defaults</button>
            </nav>

            <div id="re-error" class="reditor__error" hidden></div>

            <div class="reditor__split">
              <div id="re-list" class="reditor__list"></div>
              <div id="re-detail" class="reditor__detail"></div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
